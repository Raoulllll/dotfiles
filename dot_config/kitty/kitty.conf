# ─────────────────────────────────────────────────────────────────
#  Font & Typography Specs
# ─────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# ─────────────────────────────────────────────────────────────────
# 󰉼 Window & Spacing Layout (Matching Ultrawide OLED Spacing)
# ─────────────────────────────────────────────────────────────────
window_padding_width  12
placement_strategy    center
hide_window_decorations yes

# Disable traditional terminal bell audio completely
enable_audio_bell no

# ─────────────────────────────────────────────────────────────────
#  Color Palette (Cyan & Magenta Accents)
# ─────────────────────────────────────────────────────────────────
background            #1a1b26
foreground            #c0caf5
selection_background  #343b58
selection_foreground  #c0caf5

# Tab Bar styling
active_tab_background   #7aa2f7
active_tab_foreground   #1f2335
inactive_tab_background #353b45
inactive_tab_foreground #a9b1d6

# The Standard 16 Terminal Colors
# Black / Grey
color0 #15161e
color8 #414868
# Red
color1 #f7768e
color9 #f7768e
# Green
color2 #9ece6a
color10 #9ece6a
# Yellow
color3 #e0af68
color11 #e0af68
# Blue (Matches your Fastfetch Boxes)
color4 #7aa2f7
color12 #7aa2f7
# Magenta (Matches your Container Blocks)
color5 #bb9af7
color13 #bb9af7
# Cyan (Matches your Title/OS lines)
color6 #7dcfff
color14 #7dcfff
# White
color7 #a9b1d6
color15 #c0caf5

# ─────────────────────────────────────────────────────────────────
#  Custom Dynamic Keybindings (Fish Configurations Match)
# ─────────────────────────────────────────────────────────────────
# Map standard Zoom parameters cleanly
map ctrl+equal  change_font_size all +1.0
map ctrl+minus  change_font_size all -1.0
map ctrl+0      change_font_size all 0

# Clipboard manipulation
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Clear terminal screen scrollback history safely
map ctrl+shift+k clear_terminal scrollback active# ─────────────────────────────────────────────────────────────────
