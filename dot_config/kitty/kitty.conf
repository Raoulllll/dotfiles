# ─────────────────────────────────────────────────────────────────
# 󰩊 Translucency & Blur Settings
# ─────────────────────────────────────────────────────────────────
# Sets the opacity of the window background (0.0 = clear, 1.0 = solid)
background_opacity 0.60

# Enables Wayland/KDE compositor-side background blurring
background_blur 1
